version: '3.8'

services:

  api:
    build: 
      context: .
      dockerfile: Dockerfile
    container_name: promptguard_api
    
    ports:
      - "8000:8000"
    
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://user:password@db:5432/dbname
    
    depends_on:
      db:
        condition: service_healthy
    restart: always

 
  db:
    image: postgres:15-alpine
    container_name: postgres_db
    environment:
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=dbname
    volumes:
     
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d dbname"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
